# Configuration global settings
add_newline = true
palette = "neon"

format = """\
[╭╴](fg:arrow)\
$os\
$username\
$directory\
(\
    $git_branch\
    $git_status\
)\
(\
    $python\
    $conda\
    $nodejs\
    $docker_context\
)\
$cmd_duration\
$fill\
$time
[╰─](fg:arrow)$character
"""

[fill]
symbol = " 󰮯"
style = "fg:arrow"
disabled = false

