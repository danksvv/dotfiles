# =================================================================
##                  APARIENCIA Y ESTILO
## =================================================================

# # --- Fuente ---
# Cambiada a la fuente solicitada: Liga SFMono Nerd font
# font_family      Liga SFMono Nerd font
font_family FiraCode Nerd Font Mono
font_size 14.5

# Especificamos las variantes (usando Medium Italic para el texto regular)
italic_font      auto
bold_font        auto
bold_italic_font auto

# --- Ajuste de Grosor ---
bold_font_weight 600

# Habilitar Ligaduras: Usaremos la directiva de características de forma simple.
# El comando '+liga' es el que activa las ligaduras estándar.
# (Esta línea ya estaba correcta para habilitar ligaduras)
font_features +liga
# font_features +calt +liga
# font_features +rlig +liga

# --- Transparencia y Blur ---
# Nivel de opacidad (0.0 a 1.0)
background_opacity 0.90

# Nivel de desenfoque/blur (si tu sistema operativo lo soporta)
background_blur 1
#
# Resta 2 píxeles de espacio entre líneas
adjust_line_height -2
# --- Tema de Color (Gooey) ---
# Cambiado el archivo de tema. Deberás descargar y colocar el archivo gooey.conf
# include themes/gooey.conf
include ./theme.conf

hide_window_decorations titlebar-only

hide_window_decorations yes

# abrir editor de configuracion ctrl + shift + f2 
export EDITOR='nvim'
export VISUAL='nvim'

# zellij activar alt 
macos_option_as_alt yes

# --- CONFIGURACIÓN DE PESTAÑAS (ESTILO POWERLINE REDONDEADO) ---

# 1. El Estilo General de la Barra
# ----------------------------------------------------
# Establece el estilo a 'powerline' para obtener las formas de flecha/triángulo.
tab_bar_style powerline

# --- ESTA ES LA LÍNEA QUE CAMBIA ---
# 'angled'   es el triángulo (flecha).
# 'round'    es el borde redondeado que buscas.
tab_powerline_style round

# Define dónde mostrar la barra de pestañas.
# 'top' (arriba), 'bottom' (abajo)
tab_bar_edge bottom 

# Oculta la barra de pestañas si solo hay una pestaña abierta.
tab_bar_min_tabs 2

# 2. Colores y Fuentes
# ----------------------------------------------------
# (Estos son los colores de ejemplo que te di antes)

# Color de fondo de la barra (el espacio vacío donde no hay pestañas)
tab_bar_background #1e1e2e

# --- Pestaña ACTIVA (la que estás viendo) ---
active_tab_foreground   #11111b
active_tab_background   #cba6f7
active_tab_font_style   bold

# --- Pestañas INACTIVAS (las otras) ---
inactive_tab_foreground #a6adc8
inactive_tab_background #313244
inactive_tab_font_style normal


# 3. Formato del Título de la Pestaña
# ----------------------------------------------------
# Ejemplo: "1: nvim"
tab_title_template " {index}: {title}"

